services:
  - type: web
    name: nairobi-designer-agent
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.0
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./designer_agent.db
      - key: FRONTEND_URL
        value: https://your-frontend.vercel.app
      - key: DEBUG
        value: "false"
      - fromGroup: designer-agent-secrets
    healthCheckPath: /api/v1/health
    autoDeploy: true
